<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hari-demo-web</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #1e3a8a, #6d28d9);
        color: #fff;
      }
      .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        padding: 3rem 4rem;
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 2.5rem;
      }
      p {
        margin: 0;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>hari-demo-web</h1>
      <p>A demo web app built with Flask.</p>
    </main>
  </body>
</html>
